# ── CI de BotPanel ────────────────────────────────────────────────────
# Corre en cada push/PR: sintaxis + lint + tipos (@ts-check) + tests de
# dinero. NO necesita secretos (los tests son funciones puras, sin BD).
# Si esto está en rojo, NO se mergea (barandilla de la migración).
# Monorepo con npm workspaces: UN solo lockfile en la raíz, npm ci instala todo.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    name: Lint + Tipos + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias (workspaces)
        run: npm ci

      - name: Sintaxis de todos los módulos
        run: for f in server/*.js; do node --check "$f"; done

      - name: ESLint (errores reales bloquean)
        run: npm run lint -w @botpanel/server

      - name: Tipos (@ts-check en módulos de dinero)
        run: npm run typecheck -w @botpanel/server

      - name: Tests del núcleo de dinero
        run: npm test -w @botpanel/server

  panel-react:
    name: Panel cliente (React + TS) — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias (workspaces)
        run: npm ci

      - name: Type-check + build (tsc + vite)
        run: npm run build -w @botpanel/client

  panel-admin:
    name: Panel admin (React + TS) — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias (workspaces)
        run: npm ci

      - name: Type-check + build (tsc + vite)
        run: npm run build -w @botpanel/admin
